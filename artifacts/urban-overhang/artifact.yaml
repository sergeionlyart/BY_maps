sources:
  - id: ghsl_built_s_r2023a
    url: "https://human-settlement.emergency.copernicus.eu/ghs_buS2023.php"
    description: "GHS-BUILT-S R2023A: накопленная застроенная поверхность, 100 м, Молльвейде, эпохи 1975–2020; 40 тайлов с URL+sha256 в sources/raw/registry_ghsl.csv"
    license: "CC BY 4.0 (Pesaresi M., Politis P. (2023), European Commission JRC)"
    accessed: "2026-07-16"
    sha256: ""
    vendored: "sources/raw/registry_ghsl.csv"
    fetch: "python3 code/fetch.py --ghsl"
  - id: geofabrik_belarus_pbf
    url: "https://download.geofabrik.de/europe/belarus-latest.osm.pbf"
    description: "Снимок OSM Беларуси (выгрузка 2026-07-15); дороги, сервисы, здания, административные границы"
    license: "ODbL 1.0 (© OpenStreetMap contributors)"
    accessed: "2026-07-16"
    sha256: "048d0ccfb8847ac584b45b2eed96cf8f13a117bdd671dccda4bb2b93248080cc"
    vendored: "sources/raw/registry_osm.csv"
    fetch: "python3 code/fetch.py --osm"
  - id: bymaps_population
    url: "https://pop-stat.mashke.org/belarus-cities.htm"
    description: "Ряды населения 94 городов (переписи и оценки Белстата; компиляция pop-stat.mashke.org, обработка BY Maps)"
    license: "использование с указанием источника"
    accessed: "2026-07-16"
    sha256: ""
    vendored: "sources/raw/city_population.csv"
    fetch: "см. пакет by-maps-zipf"
  - id: inf08_nightlights_clips
    url: "https://by-population-maps.vercel.app/artifacts/nightlights"
    description: "Зональные суммы ночной светимости по маскам городов (calDMSP 1992–2013, VNL 2012–2024; вырезки INF-08 v2 c дефакеляцией)"
    license: "CC BY 4.0 (Li et al.); VNL — Earth Observation Group"
    accessed: "2026-07-16"
    sha256: ""
    vendored: "sources/raw/city_light.csv"
    fetch: "пакет by-maps-nightlights-v2.1.1"
  - id: inf06_monotowns
    url: "https://by-population-maps.vercel.app/artifacts/monotowns"
    description: "Реестр моногородов (mono_dependence для алгоритма выбора кейса)"
    license: "CC BY 4.0 (BY Maps)"
    accessed: "2026-07-16"
    sha256: ""
    vendored: "sources/raw/monotowns.csv"
    fetch: "пакет by-maps-monotowns-v1.0.0"

entrypoints:
  reproduce: "code/run.sh"
  verify: "python3 code/verify.py"

environment:
  python: ">=3.10"
  lock: "code/requirements.lock"
  seed: null            # расчёт детерминирован, случайности нет

# Контрольные значения покрывают все ключевые числа лендинга и REPORT.
expected_results:
  - { metric: n_cities, value: 92, tolerance: 0,
      description: "городов в панели главного интервала 1990-2020" }
  - { metric: n_declining, value: 39, tolerance: 0,
      description: "городов с сокращением населения (PGR < -0.001)" }
  - { metric: n_growing, value: 39, tolerance: 0,
      description: "городов с ростом населения (PGR > 0.001)" }
  - { metric: n_overhang_robust, value: 39, tolerance: 0,
      description: "сокращающихся с устойчиво положительным MOR (9 сценариев + MDC)" }
  - { metric: share_declining_with_overhang, value: 1.0, tolerance: 0.0001,
      description: "доля сокращающихся с устойчивым навесом" }
  - { metric: median_mor_declining, value: 0.01828, tolerance: 0.0002,
      description: "медианный темп материального навеса сокращающихся, 1/год" }
  - { metric: median_bpc_1990, value: 67.3, tolerance: 0.05,
      description: "медианная застройка на жителя 1990, м² (панель)" }
  - { metric: median_bpc_2020, value: 119.41, tolerance: 0.05,
      description: "медианная застройка на жителя 2020, м² (панель)" }
  - { metric: matching_pairs, value: 31, tolerance: 0,
      description: "сопоставленных пар сокращающийся-двойник" }
  - { metric: matching_median_mor_gap, value: 0.00238, tolerance: 0.0002,
      description: "медианный разрыв MOR в парах, 1/год" }
  - { metric: matching_sign_test_p, value: 0.0708, tolerance: 0.001,
      description: "двусторонний знаковый тест разрыва MOR в парах (описательный)" }
  - { metric: median_mor_growing, value: 0.01384, tolerance: 0.0002,
      description: "медианный MOR растущих городов, 1/год" }
  - { metric: pop_share_in_overhang, value: 0.1584, tolerance: 0.001,
      description: "доля населения панели в городах с устойчивым навесом" }
  - { metric: type_counts.T1, value: 38, tolerance: 0,
      description: "городов типа T1 (компактный рост)" }
  - { metric: type_counts.T3, value: 1, tolerance: 0,
      description: "городов типа T3 (стабильная оболочка при депопуляции)" }
  - { metric: type_counts.T4, value: 38, tolerance: 0,
      description: "городов типа T4 (расширение при депопуляции)" }
  - { metric: type_counts.TX, value: 15, tolerance: 0,
      description: "городов с неопределённой траекторией" }
