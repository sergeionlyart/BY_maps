  - { path: sources/raw/admin_areas.csv, from: data/raw/urban/admin_areas.csv,
      role: raw, license: "ODbL 1.0 (производная OSM, © OpenStreetMap contributors)" }
  - { path: sources/raw/admin_built.csv, from: data/raw/urban/admin_built.csv,
      role: raw, license: "ODbL 1.0/CC BY 4.0 (пересечение админ-границ OSM и GHSL)" }
  - { path: code/run.sh, role: code }
