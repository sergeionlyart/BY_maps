# Декларативное описание проверяемого пакета INF-12 `urban-overhang`
# (ARTIFACT_STANDARD.md v1.0). Сборка: python -m etl.artifacts.build urban-overhang

id: urban-overhang
title: "Цена пустеющей карты: материальный навес городов Беларуси, 1975–2020"
version: "1.0.0"
released: "2026-07-16"
landing_url: "https://by-population-maps.vercel.app/research/urban-overhang"
authors:
  - "Проект «Население Беларуси, 1897–2026»"

files:
  - { path: README.md, role: docs }
  - { path: REPORT.md, role: docs }
  - { path: EXECUTIVE_BRIEF.md, role: docs }
  - { path: METHODS.md, role: docs }
  - { path: LIMITATIONS.md, role: docs }
  - { path: VALIDATION.md, role: docs }
  - { path: DATA_DICTIONARY.md, role: docs }
  - { path: PROVENANCE.md, role: docs }
  - { path: PREREGISTRATION.md, role: docs }
  - { path: AGENT.md, role: docs }
  - { path: CHANGELOG.md, role: docs }
  - { path: CITATION.cff, role: docs }
  - { path: LICENSE.md, role: docs }
  - { path: claims.yaml, role: docs }
  - { path: sources/registry.csv, role: docs }
  - { path: sources/raw/registry_ghsl.csv, from: data/raw/urban/registry_ghsl.csv, role: raw }
  - { path: sources/raw/registry_osm.csv, from: data/raw/urban/registry_osm.csv, role: raw }
