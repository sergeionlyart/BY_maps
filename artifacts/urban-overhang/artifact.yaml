  - { path: sources/raw/exclusions.csv, from: data/curated/urban/exclusions.csv, role: raw }
  - { path: sources/raw/city_population.csv, from: data/curated/urban/city_population.csv,
      role: raw, license: "официальная статистика (Белстат/переписи), компиляция pop-stat.mashke.org; использование с указанием источника" }
  - { path: sources/raw/monotowns.csv, from: data/curated/monotowns.csv, role: raw, license: "CC BY 4.0 (BY Maps, INF-06)" }
  - { path: sources/raw/morph_city_epoch.csv, from: data/raw/urban/morph_city_epoch.csv,
      role: raw, license: "CC BY 4.0 (производная GHS-BUILT-S R2023A, JRC)" }
  - { path: sources/raw/morph_fixed.csv, from: data/raw/urban/morph_fixed.csv,
      role: raw, license: "CC BY 4.0 (производная GHS-BUILT-S R2023A, JRC)" }
  - { path: sources/raw/morph_flows.csv, from: data/raw/urban/morph_flows.csv,
      role: raw, license: "CC BY 4.0 (производная GHS-BUILT-S R2023A, JRC)" }
  - { path: sources/raw/morph_qa.csv, from: data/raw/urban/morph_qa.csv,
      role: raw, license: "CC BY 4.0 (производная GHS-BUILT-S R2023A, JRC)" }
  - { path: sources/raw/city_light.csv, from: data/raw/urban/city_light.csv,
      role: raw, license: "CC BY 4.0 (производная calDMSP Li et al. / VNL EOG, вырезки INF-08)" }
  - { path: sources/raw/city_roads.csv, from: data/raw/urban/city_roads.csv,
      role: raw, license: "ODbL 1.0 (производная OSM, © OpenStreetMap contributors)" }
  - { path: sources/raw/city_poi.csv, from: data/raw/urban/city_poi.csv,
      role: raw, license: "ODbL 1.0 (производная OSM, © OpenStreetMap contributors)" }
  - { path: sources/raw/city_buildings.csv, from: data/raw/urban/city_buildings.csv,
