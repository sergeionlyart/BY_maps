# Допущения расчёта - каждое с обоснованием. Варьирование - AGENT.md, задача 3.

estimator:
  value: "gabaix-ibragimov"
  what: "наклон rank-size оценивается OLS-регрессией log(rank - 1/2) на log(pop)"
  why: >
    Поправка -1/2 (Gabaix & Ibragimov, 2011, Journal of Business & Economic
    Statistics 29(1)) устраняет систематическое смещение OLS-оценки на малых
    выборках; стандартная ошибка |b|*sqrt(2/N). Стандарт де-факто в
    литературе о законе Ципфа для городов.
  vary: >
    обычная OLS log(rank)~log(pop) даёт наклон положе на ~0.11 (2019:
    -0.857 против -0.965 у GI; сдвиг стабилен по годам) - меньше половины
    SE и без влияния на выводы; поправка -1/2 компенсирует именно это
    систематическое занижение |наклона| на малых N

baseline_n:
  value: 30
  what: "наклон оценивается по топ-30 городов каждого среза"
  why: >
    Максимальный размер топ-списка, доступный во ВСЕХ срезах, включая 1897
    год (43 города с данными): единый N делает наклоны сопоставимыми во
    времени. N=20 и N=50 приведены в zipf_slopes.csv как чувствительность.
  vary: "code/build.py --top-n <N>; при N=50 наклон положе на ~0.1"

years:
  value: [1897, 1923, 1926, 1939, 1959, 1970, 1979, 1989, 1999, 2009, 2019, 2026]
  what: "срезы: все переписи в источнике + текущая оценка на 01.01.2026"
  why: >
    Только годы, фактически присутствующие в источнике; интерполяция между
    переписями НЕ используется - ранжировка на интерполированных значениях
    создавала бы ложную точность.

census_priority:
  value: true
  what: "если на год есть и перепись, и оценка - берётся перепись"
  why: "перепись - прямое наблюдение; оценка - расчётная экстраполяция"

city_set:
  value: "все городские НП таблицы источника"
  what: "города + городские посёлки (222 НП), а не только юридические 'города'"
  why: >
    Закон Ципфа - о распределении размеров поселений; юридический статус
    ('город' против 'гп') административен и менялся во времени. На топ-30
    выбор не влияет (все топ-30 - города), на N=50 влияет незначительно.

primacy_definition:
  value: "население первого города / население второго"
  what: "классический индекс примации (Jefferson 1939, two-city ratio)"
  why: "при точном законе Ципфа равен 2; наглядная мера макроцефалии"
