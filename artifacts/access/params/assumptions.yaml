# Все допущения INF-04 с обоснованиями. Файл ДОКУМЕНТИРУЕТ допущения и
# кодом не читается: для стресс-теста правьте константы в etl/access.py
# (BELTS, OBL_CENTER_CITY) или etl/osm_graph.py (SPEEDS) и перезапускайте
# code/run.sh - рецепты в AGENT.md.

speeds:
  value: "motorway 105, trunk 90, primary 75, secondary 60, tertiary 45 км/ч (+_link те же)"
  why: >
    консервативные средние для Беларуси: ниже разрешённых (120/100/90),
    что грубо компенсирует города, ремонты и перекрёстки; классы ниже
    tertiary не нужны - каждый райцентр в паре км от secondary+

belts:
  value: "<45 мин / 45-90 / 90-150 («кольцо 1,5-2,5 ч») / >150"
  why: >
    границы из спеки INF-04: 45 мин - предел комфортного ежедневного
    маятника, 1,5-2,5 ч - «слишком далеко ездить, слишком близко, чтобы
    удержать своё» - гипотетическая зона тени

effective_access:
  value: "минимум времени до Минска и до ближайшего облцентра"
  why: >
    облцентры - самостоятельные полюса притяжения (свои CCMPP в прогнозе);
    профиль по чистому «до Минска» публикуется параллельно

raion_node:
  value: "узел графа, ближайший к райцентру; для районов-хостов - к городу областного подчинения"
  why: >
    райцентр - модальная точка расселения района; хосты (Брест, Гродно...)
    сами являются целью, время «до себя» = 0 некорректно только для
    города, а не для сельской части - огрубление принято

border_status:
  value: "легковой автомобильный трафик; Козловичи (грузовой) и Переров (пешеходный) исключены"
  why: >
    население перемещается легковыми и автобусами; три состояния: 2019
    (13 пунктов), надир 03.2024-11.2025 (4), 11.07.2026 (6, после
    реоткрытия Кузницы и Бобровников)

window:
  value: "динамика населения 2015-2025, зарплатный дифференциал - среднее 2015-2024"
  why: "идентично INF-03 - профили и регрессии сопоставимы напрямую"

regression:
  value: "OLS: popChange10 (п.п.) ~ дамми поясов (база >2,5 ч) + ln(wage_rel) + ln(pop райцентра); SE классические и HC1"
  why: >
    минимальная спецификация, отделяющая доступность от зарплатного
    градиента INF-03; гетероскедастичность сильная - публикуются оба SE.
    ВНИМАНИЕ: Минский район - точка рычага контролей (center_pop=1,
    ln=0 при крупнейшей динамике выборки) - см. LIMITATIONS п.11;
    коэффициенты поясов к его исключению устойчивы

quantiles:
  value: "медиана и квартели профиля - statistics.quantiles(method=\"inclusive\")"
  why: >
    стандартная интерполяционная конвенция стандартной библиотеки;
    индексные конвенции сдвигают медианы малых поясов (n=6) на десятые
    доли п.п., немонотонность профиля сохраняется при любой
