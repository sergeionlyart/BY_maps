# Все допущения INF-02 с обоснованиями. Файл ДОКУМЕНТИРУЕТ допущения и
# кодом не читается: для стресс-теста правьте константы в etl/aging.py
# (THRESHOLD_65, HORIZON_STEPS, E0_BASE) и перезапускайте code/run.sh -
# конкретные рецепты в AGENT.md.

threshold_65plus:
  value: 0.30
  rationale: >
    Порог «сверхстарой» структуры: на одного жителя 65+ приходится менее
    двух в рабочих возрастах. Конвенция; ранжирование районов от неё не
    зависит (см. LIMITATIONS.md, п. 8).

horizon_steps:
  value: 12          # 60 лет от 2019
  rationale: "за пределами 60 лет когортная детерминированность исчерпывается"

counterfactual_migration:
  value: 0
  rationale: >
    Диагностический сценарий: показывает, какая динамика заложена в самой
    возрастной структуре. НЕ прогноз.

e0_base:
  value: { m: 72.0, f: 81.5 }
  rationale: >
    Фиксированные e0 контрфакта - уровень базовой траектории прогноза
    v2026.2 (WPP medium) на ~2035-2040 гг., применяется на всём горизонте
    без роста дожития (упрощение); смертность - национальные mx HMD-2018,
    масштабированные к этим e0. Стресс +-1 год: число пересекающих порог
    меняется 28 -> 19...34, вывод об естественной убыли (117 из 118)
    устойчив.

asfr_profile:
  value: "областной профиль 2018 г.; для района - профиль его области"
  rationale: >
    Районных ASFR не существует в открытом доступе; областной профиль
    сохраняет региональные различия календаря рождаемости.

age_group_80plus_width:
  value: 20          # медиана: открытая группа условно до 100 лет
  rationale: "влияет только при медиане >77,5 года - таких территорий нет"

undetermined_age_2009:
  value: "пропорциональное распределение по структуре территории и пола"
  rationale: >
    296 человек по стране (0,003% населения) без возраста в переписи-2009;
    стандартная практика; суммы пирамид сходятся с официальными итогами.
