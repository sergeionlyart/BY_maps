sources:
  - id: dataportal_migration
    url: "https://dataportal.belstat.gov.by/osids-public-api/indicator/indicatorValuesSearch"
    description: "Индикаторы 10101300001/2/3: прибывшие/выбывшие/сальдо, 128 территорий, 1990-2019 + 2024-2025 (2020-2023 не публиковались); тела запросов - belstat_request_log.json"
    license: "открытые данные Белстата"
    accessed: "2026-07-12"
  - id: eurostat_permits
    url: "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/migr_resvalid"
    description: "ВНЖ граждан BY: сток (migr_resvalid) и первичные (migr_resfirst), citizen=BY, duration=TOTAL, reason=TOTAL, unit=PER, 31 geo, 2015-2025"
    license: "Eurostat, свободное переиспользование с указанием источника"
    accessed: "2026-07-12"
  - id: point_estimates
    url: "см. sources/registry.csv (zerkalo.io, pap.pl, nashaniva.com, en.belsat.eu, DHS, Демоскоп, IOM)"
    description: "Точечные оценки волны 2020+ и не-ЕС направления; каждый снапшот завендорен с sha256"
    license: "цитирование в исследовательских целях"
    accessed: "2026-07-12"
  - id: census_f602
    url: "https://census.belstat.gov.by (OLAP, куб F602)"
    description: "Межобластная матрица накопленной миграции переписи-2019 (WP-F1 проекта)"
    license: "открытые данные Белстата"
    accessed: "2026-07-11"

entrypoints:
  reproduce: "code/run.sh"
  verify: "python3 checks/tests/test_invariants.py"

environment:
  python: ">=3.10"
  lock: "code/requirements.lock"
  seed: null   # расчёт детерминирован

expected_results:
  - { metric: raion_series, value: 128, tolerance: 0,
      description: "территорий с рядами сальдо (118 районов + 10 городов обл. подчинения)" }
  - { metric: raion_sum_2019, value: 4613, tolerance: 0,
      description: "сумма сальдо 128 территорий за 2019 (без Минска: у столицы нет районного уровня)" }
  - { metric: intl_official_2019, value: 13870, tolerance: 0,
      description: "официальное международное сальдо РБ 2019 - положительное (контраст с зеркалом)" }
  - { metric: eu_stock_2019, value: 133889, tolerance: 0,
      description: "действующие ВНЖ граждан BY в ЕС-27 на 31.12.2019 (Eurostat)" }
  - { metric: eu_stock_2024, value: 386834, tolerance: 0,
      description: "то же на 31.12.2024: рост в 2,9 раза - жёсткий пол внешней волны" }
  - { metric: eu_first_2022, value: 311516, tolerance: 0,
      description: "пик первичных ВНЖ ЕС-27 (2022)" }
  - { metric: pl_stock_latest, value: 251362, tolerance: 0,
      description: "Польша: сток ВНЖ 2024 - крупнейшее направление" }
  - { metric: matrix_total, value: 1459418, tolerance: 0,
      description: "межобластных переходов в накопленной матрице F602 переписи-2019" }
  - { metric: top_flow, value: 310081, tolerance: 0,
      description: "крупнейший поток: Минская область -> Минск" }
  - { metric: net_minsk, value: 528899, tolerance: 0,
      description: "накопленное нетто Минска - единственный магнит; остальные 6 регионов в минусе" }
  - { metric: interval_low, value: 178285, tolerance: 0,
      description: "нижняя граница неучтённого оттока 2020-2026 (WP-F3, импорт)" }
  - { metric: interval_mid, value: 269955, tolerance: 0,
      description: "центральная оценка WP-F3" }
  - { metric: interval_high, value: 415883, tolerance: 0,
      description: "верхняя граница WP-F3" }
  - { metric: rural_1959, value: 5524451, tolerance: 0,
      description: "село в 1959: 5,52 млн" }
  - { metric: rural_2026, value: 1911181, tolerance: 0,
      description: "село в 2026: 1,91 млн (-65% за 67 лет) - основание лестницы" }
  - { metric: minsk_2026, value: 1995091, tolerance: 0,
      description: "Минск в 2026 (х3,9 к 1959) - вершина внутренней лестницы" }
  - { metric: rate_minski_1519, value: 35.11, tolerance: 0.005,
      description: "Минский район: +35 промилле в год (2015-2019) - максимум страны" }
