# Все допущения INF-05 с обоснованиями. Файл ДОКУМЕНТИРУЕТ допущения и
# кодом не читается: для стресс-теста правьте константы в etl/migration.py
# (LADDER_YEARS, ESTIMATES, NON_EU) или etl/mirror.py (TIME_PROFILE,
# формулы интервала) и перезапускайте code/run.sh - рецепты в AGENT.md.

ladder_tiers:
  value: "Минск / 5 облцентров / 114 райцентров / прочие города и пгт / село (= страна - учтённые города)"
  why: >
    ступени соответствуют «лестнице» из спеки; райцентр = город из поля
    center района (минус облцентры и Минск); малые пгт без ранних рядов
    попадают в остаток «село» (завышение села до 1989 г. - в LIMITATIONS)

rates_periods:
  value: "средние ставки за 2015-2019 и 2024-2025, промилле в год"
  why: >
    последняя пятилетка перед дырой 2020-2023 и всё, что опубликовано
    после; нормировка на среднее население периода из рядов проекта

matrix_use:
  value: "F602 (накопленная) - только карта направлений, не объём потока"
  why: >
    годовые матрицы после 2019 закрыты; lifetime-направления устойчивы
    (в прогнозе объём калибруется отдельно константой 60 тыс./год)

interval_import:
  value: "интервал оттока 178/270/416 тыс. импортируется из WP-F3 (etl/mirror.py)"
  why: >
    единая точка истины: методика и чувствительность разобраны в
    docs/notes/adjustment.md и пакете forecast v1.2.0; здесь не
    пересчитывается и не подгоняется

time_profile:
  value: "2020: 4%, 2021: 28%, 2022: 55%, 2023: 8%, 2024: 3%, 2025: 2%"
  why: >
    экспертный профиль WP-F3 по динамике первичных ВНЖ ЕС (пик 2022 =
    311,5 тыс. первичных разрешений)

estimates_as_is:
  value: "точечные оценки 100-600 тыс. показаны без приведения к одному определению"
  why: >
    определения «уехавшего» и даты несопоставимы; честнее показать
    вилку и источники, чем изобретать консенсус (приёмка спеки)

country_threshold:
  value: "в страны назначения попадают geo со стоком >= 1000 в 2019 или в последнем году"
  why: "отсечка шума микростран; полный ряд по 31 geo - в сырье"
