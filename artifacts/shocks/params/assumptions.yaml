# Все допущения INF-09 с обоснованиями. Файл ДОКУМЕНТИРУЕТ допущения и
# кодом не читается: для стресс-теста правьте SERIES_YEARS в etl/shocks.py.

national_series:
  value: "ряд населения Беларуси 1897-2026 (переписи + оценки проекта)"
  why: "единый ряд показывает и катастрофу ВМВ (1940->1950), и восстановление"

jewish_share:
  value: "доля евреев города-1897 = говорящие на идиш / всё население x 100"
  why: >
    перепись-1897 давала родной язык, не этничность; идиш - близкое
    приближение еврейского населения (оговорка: язык != этничность)

holocaust_framing:
  value: "доля-1897 как мера утраченного; НЕ оценка жертв города"
  why: >
    сопоставление населения 1939->1959 по общему числу вводит в
    заблуждение (города восстановились иным населением); настоящий шок
    композиционный - исчезновение еврейского большинства местечка

events:
  value: "редакторская хронология, каждое событие с >=1 проверяемым источником"
  why: >
    чувствительные темы - строго фактологически; масштабы даются с
    источником/диапазоном, не единственным числом; Чернобыль-1986 - в INF-07

pop_source_priority:
  value: "население Холокост-городов - из рядов проекта (приоритет над оценками разведки)"
  why: "единообразие с остальным проектом; ряды переписей точнее вторичных оценок"
