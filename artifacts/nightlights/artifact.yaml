# Проверяемый пакет INF-08 v2.1 «Беларусь из космоса, 1992-2075»:
# аналитика + визуальный слой (реконструкция/наблюдения/модель), delta,
# события и адаптивная скорость.
# Сборка: python -m etl.artifacts.build nightlights

id: nightlights
title: "Беларусь из космоса, 1992-2075: гармонизированная ночная светимость DMSP/VIIRS по районам, индекс расхождения свет/население и модельная иллюстрация будущего по прогнозу v2026.4"
version: "2.1.0"
released: "2026-07-14"
landing_url: "https://by-population-maps.vercel.app/research/nightlights"
authors:
  - "Проект «Население Беларуси, 1897-2026»"

