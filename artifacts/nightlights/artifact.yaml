sources:
  - id: li_harmonized
    url: "https://doi.org/10.6084/m9.figshare.9828827"
    description: "Li et al., Harmonization of DMSP and VIIRS nighttime light data 1992-2024 (Scientific Data): calDMSP 1992-2013 - ретро-сегмент; simVIIRS 2013-2024 - мост калибровки и спайк-сравнение. Анонимная загрузка, sha256 каждого файла - sources/registry.csv"
    license: "CC BY 4.0"
    accessed: "2026-07-14"
  - id: vnl_mirror
    url: "https://zenodo.org/records/17294744"
    description: "EOG VIIRS VNL v2.1 annual average (Colorado School of Mines / Payne Institute) в зеркале OpenGeoHub, 500 м EPSG:4326, 2012-2024; значения x10 возвращены к нВт/см²/ср при вырезке. Сам EOG за логином - зеркало ради анонимной воспроизводимости"
    license: "CC BY 4.0 (зеркало); EOG VNL - свободное использование с цитированием"
    accessed: "2026-07-14"
  - id: worldpop_viirs
    url: "https://data.worldpop.org/GIS/Covariates/Global_2015_2030/BLR/VIIRS/v1/fvf/"
    description: "WorldPop fvf (VNL average_masked, 100 м, 2015-2023) - источник v1, в v2 используется как независимая кросс-проверка ряда VNL (R² ln-долей 0,93-0,98)"
    license: "CC BY 4.0 (WorldPop)"
    accessed: "2026-07-12"
  - id: forecast_v2026_4
    url: "https://by-population-maps.vercel.app/artifacts/by-maps-forecast-v1.3.0.zip"
    description: "Прогноз населения проекта v2026.4 (пакет forecast v1.3.0): входы модели будущей светимости - 3 сценария x 2 стартовых ряда, районы/Минск"
    license: "CC BY 4.0"
    accessed: "2026-07-14"

entrypoints:
  reproduce: "code/run.sh"
  verify: "python3 checks/tests/test_invariants.py"

environment:
  python: ">=3.10"
  lock: "code/requirements.lock"
  seed: 20260712   # дизеринг кадров/рилса; зональный расчёт детерминирован

expected_results:
  - { metric: n_zones, value: 119, tolerance: 0,
      description: "зон: 118 районов + Минск (adm1; в adm2 он «дыра» Минского района)" }
  - { metric: n_frames_manifest, value: 93, tolerance: 0,
      description: "кадров визуального слоя: 20 реконструкция + 13 наблюдения + 60 модель" }
  - { metric: n_events_total, value: 14, tolerance: 0,
      description: "событий таймлайна (включая методологические переходы 2012/2021 и границу модели)" }
  - { metric: n_events_regional, value: 9, tolerance: 0,
      description: "региональных событий по аналитическому скорингу (z-оценка долей с весом и персистентностью)" }
  - { metric: bridge_r2, value: 0.9217, tolerance: 0.001,
      description: "R² моста DN->радианс (simVIIRS/VNL 2014-2024, FE года; гейт >= 0,9)" }
  - { metric: bridge_b, value: 0.9151, tolerance: 0.001,
      description: "наклон моста ln V = a_y + b ln S" }
  - { metric: f18_factor, value: 0.4857, tolerance: 0.001,
      description: "коррекция F18-эры calDMSP 2010-2013 (остаточное ~2x завышение)" }
  - { metric: seam_gap, value: -0.0299, tolerance: 0.002,
      description: "разрыв нац. суммы на стыке, симметричные 4-летние окна 2008-2011|2012-2015 (out-of-sample; гейт +-5%)" }
  - { metric: nat_light_1992, value: 378550.4, tolerance: 1.0,
      description: "нац. светимость 1992 в радианс-эквиваленте (калибровка моста)" }
  - { metric: nat_light_2024, value: 512716.0, tolerance: 1.0,
      description: "нац. светимость 2024, фактический VNL (нВт/см²/ср x пиксели 500 м)" }
  - { metric: div_minsk, value: 0.0671, tolerance: 0.001,
      description: "Минск: v1-индекс расхождения ≈ 0 - свет столицы вровень с населением (ряд VNL)" }
  - { metric: div_smalavicki, value: -0.4516, tolerance: 0.001,
      description: "Смолевичский район (Жодино, БелАЗ): доля света ×0,63 от тренда при населении ×0,99 - сюжет v1 воспроизводится на независимом источнике" }
  - { metric: lr_smalavicki, value: 0.6309, tolerance: 0.001,
      description: "отношение доли света Смолевичского района к тренду 2015-2019" }
  - { metric: div_salihorski, value: -0.4662, tolerance: 0.001,
      description: "Солигорский район: сопоставимое с Жодино расхождение" }
  - { metric: beta_industrial, value: 1.5979, tolerance: 0.005,
      description: "межрайонная эластичность яркой компоненты, индустриальный класс (SE 0,18, R² 0,79)" }
  - { metric: beta_rural, value: 1.6573, tolerance: 0.005,
      description: "то же, сельский класс (SE 0,15, R² 0,59)" }
  - { metric: floor_share_2024, value: 0.5146, tolerance: 0.001,
      description: "доля «инфраструктурного пола» (пиксели 1-5 нВт) в нац. свете 2024" }
  - { metric: model_2075_base, value: 499824.2, tolerance: 1.0,
      description: "модельный нац. свет 2075, базовый сценарий, официальный старт" }
  - { metric: model_2075_negative, value: 432637.0, tolerance: 1.0,
      description: "то же, негативный: -13% к базовому - агломерация держится, периферия тускнеет" }
  - { metric: model_2075_optimistic, value: 550229.9, tolerance: 1.0,
      description: "то же, оптимистичный: +10% к базовому" }
