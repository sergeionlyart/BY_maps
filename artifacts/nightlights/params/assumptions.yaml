# Все допущения INF-08 с обоснованиями. Файл ДОКУМЕНТИРУЕТ допущения и
# кодом не читается: для стресс-теста правьте константы в etl/nightlights.py
# (TREND_YEARS, SHOCK_YEARS) или etl/nightlights_extract.py (DIM_THRESHOLD)
# и перезапускайте code/run.sh - рецепты в AGENT.md.

product:
  value: "EOG VNL 2.1/2.2 average_masked (Colorado School of Mines) в 100-м обработке WorldPop fvf, 2015-2023"
  why: >
    подлинный годовой композит VIIRS, доступный без регистрации (сам
    EOG закрыт токеном; смоделированный NPP-VIIRS-like отвергнут за
    нефизичную нестабильность); масочный вариант убирает эфемерные
    источники, fvf - газовые факелы и вулканы

normalization:
  value: "доля зоны в национальной светимости и в национальном населении"
  why: >
    относительные величины гасят версионный скачок продукта (VNL 2.1->2.2
    в 2022) и общий калибровочный дрейф; абсолютные уровни между годами
    несопоставимы, доли - сопоставимы

trend_window:
  value: "лог-линейный OLS по долям 2015-2019"
  why: >
    докризисная «норма» до шоков 2020+; логарифм - доли меняются
    мультипликативно; версионный скачок 2021 и ковид 2020 вне окна

shock_window:
  value: "среднее долей 2022-2023"
  why: "устоявшийся шок (не переходные 2020-2021), два года гасят годовой шум"

divergence_index:
  value: "ln(доля света_факт/тренд) - ln(доля населения_факт/тренд)"
  why: >
    разность логарифмов отношений долей: не зависит ни от калибровки
    продукта, ни от общенационального версионного сдвига (оба
    сокращаются); отрицательный - свет просел относительно населения.
    МАРКЕР расхождения, НЕ оценка численности

zone_and_pop:
  value: "118 районов (adm2) + Минск (adm1 BY-HM); население - поле `pop` (район с городом)"
  why: >
    Минск в adm2 - «дыра» Минского района, выделяется из adm1; поле pop
    у района включает его город, поэтому периметр населения совпадает с
    геометрией полигона (свет тоже включает город)

dim_threshold:
  value: "радиометрия > 1 нВт/см²/ср"
  why: "ниже - фоновый шум VIIRS; сельская глубинка даёт честный ноль"

reliability:
  value: "выводы по крупным по светимости районам; малые сельские шумны"
  why: >
    при крохотной абсолютной светимости доля волатильна (медиана |индекса|
    у малых вдвое выше); лендинг ранжирует надёжные крупные
