# ЗЕРКАЛО artifacts/nightlights/params/assumptions.json -
# канонический файл JSON (пакет воспроизводится stdlib-only,
# без pyyaml). Правки вносить в JSON и перегенерировать:
#   python -m etl.nightlights_yaml
version: 2.0.0
note: Канонические параметры INF-08 v2. YAML-зеркало assumptions.yaml генерируется
  из этого файла; тест сверяет синхронность. Код читает JSON (пакет воспроизводится
  stdlib-only, без pyyaml).
zonal:
  vnl_threshold_nw: 1.0
  dn_threshold: 1
  comment: порог фона VNL (нВт/см²/ср, как в v1); DMSP stable lights уже без фона
    (DN >= 1)
deflare:
  sites:
  - name: Нафтан, Новополоцк - факел НПЗ
    lon: 28.75
    lat: 55.457
    radius_km: 2.5
  - name: Мозырский НПЗ - факел
    lon: 29.342
    lat: 51.891
    radius_km: 2.5
  comment: 'зеркало VNL - продукт average БЕЗ фильтра факелов (v1-источник WorldPop
    fvf их убирал каталогом EOG): факелы НПЗ дают до 1230 нВт/пиксель (2020) - не
    электрический свет. Диски радиуса 2,5 км вокруг двух НПЗ обнуляются в вырезках
    ОБОИХ сегментов (единообразие DMSP/VNL); теплицы, ТЭЦ, БМЗ (легитимный свет)
    не трогаем - fvf их тоже не фильтрует. Пиксели >150 нВт вне этих дисков перечислены
    и атрибутированы в валидационном отчёте'
harmonization:
  dmsp_last_year: 2011
  f18_years:
  - 2010
  - 2013
  f18_pre_window:
  - 2006
  - 2009
  bridge_years:
  - 2014
  - 2024
  seam_windows:
    retro:
    - 2008
    - 2011
    vnl:
    - 2012
    - 2015
  r2_gate: 0.9
  seam_gate: 0.05
  comment: 'схема «мост», ни одна константа не оценивается на стыке: (1) коррекция
    F18-эры f18=mean(DN 2006-2009)/mean(DN 2010-2013) внутри DMSP (остаточное ~2x
    завышение F18 после калибровки Li); (2) отображение DN->радианс ln V=a_y+b*ln
    S на перекрытии simVIIRS/VNL 2014-2024 c FE года (b и средний интерсепт a_bar
    фиксируются, R²-гейт по мосту); (3) ретро 1992-2011 = exp(a_bar+b*ln(f*DN));
    (4) стык - out-of-sample, симметричные 4-летние окна (прямое перекрытие 2012-2013
    состоит из худших лет обоих сенсоров: VNL-2012 неполный, calDMSP-2013 худший
    год F18). Кросс-сенсорный потолок зональной точности R² ln-долей ~0,78 = собственному
    стыку продукта Li; районная детализация надёжна с 2012'
model:
  base_year: 2024
  panel_years:
  - 2012
  - 2024
  panel_skip_years:
  - 2020
  nodes:
  - 2030
  - 2035
  - 2040
  - 2045
  - 2050
  - 2055
  - 2060
  - 2065
  - 2070
  - 2075
  floor_max_nw: 5.0
  floor_comment: 'инфраструктурный пол: пиксели 1..5 нВт 2024 г. (дороги, рассеянная
    подсветка) не масштабируются населением'
  beta:
    minsk_agglo: 1.0
    oblast_center: 1.0
    industrial: 1.6
    rural: 1.66
  beta_comment: 'beta = МЕЖРАЙОННАЯ (долгосрочная) эластичность яркой компоненты
    по населению: ln(bright_2024) ~ ln(pop_2024) по зонам класса (industrial +1,60
    SE 0,18 R²=0,79; rural +1,66 SE 0,15 R²=0,59) - «сколько света имеет район данного
    размера»; на горизонте 50 лет уместна равновесная связь. Для minsk_agglo/oblast_center
    (7 зон, оценка не идентифицируется: SE 0,49) принята консервативная пропорциональность
    1,0. ВНУТРИрайонная панель 2012-2024 связи почти не видит (rural даже отрицательна:
    модернизация сельского освещения при убыли населения) - свет инерционен; это
    ограничение модели, не опровержение (см. валидацию и LIMITATIONS). verify пакета
    пересчитывает межрайонные оценки и сверяет'
  classes:
    minsk_agglo:
    - BY-HM
    - r-minski
    oblast_center:
    - r-brescki
    - r-viciebski
    - r-homielski
    - r-hrodzienski
    - r-mahilouski
    industrial:
    - r-babrujski
    - r-chashnicki
    - r-dobrushski
    - r-hlybocki
    - r-ivacevicki
    - r-kasciukovicki
    - r-krychauski
    - r-lidski
    - r-luniniecki
    - r-mastouski
    - r-naraulanski
    - r-navahrudski
    - r-niasvizhski
    - r-polacki
    - r-rahachouski
    - r-salihorski
    - r-smalavicki
    - r-svietlahorski
    - r-vilejski
    - r-zhabinkauski
    - r-zhlobinski
    - r-zhytkavicki
    classes_comment: industrial = районы моногородов высокой зависимости (INF-06
      mono_dependence=high, привязка city_raion.csv), минус облцентры и агломерация;
      rural = остальные 90; приоритет agglo > oblast_center > industrial
  adjusted_scaling: oblast_ratio
  adjusted_comment: 'у районов только официальный старт прогноза; adjusted-ряд района
    = официальный * (область_adjusted/область_official) - зеркальная оценка оттока
    по районам не раскладывается (WP-F3). Анкер: знаменатель pop2024 для adjusted-ветки
    умножается на отношение adjusted/official на старте прогноза (2026) - измеренный
    свет 2024 произведён фактическим (adjusted-конвенция) населением, без поправки
    ветка занижалась бы на (отношение)^beta при той же динамике'
