# Допущения сборки pyramids.json (INF-11). Канон - код etl/pyramids.py;
# этот файл - человекочитаемое зеркало правил.
groups:
  order: ["0-4","5-9","10-14","15-19","20-24","25-29","30-34","35-39",
          "40-44","45-49","50-54","55-59","60-64","65-69","70-74",
          "75-79","80+"]
  top_open: "80+"     # 80-84/85+/90+/100+ и «N лет и старше» сводятся в 80+
  unknown: "«возраст не указан/не определён» хранится отдельным полем
    unknown: в бары не входит, в итоги входит"
history:
  censuses:
    1959: "Демоскоп sng_mar_59 (колонки «все» брачной таблицы), единичные возрасты"
    1970: "Демоскоп sng_age_70, единичные возрасты"
    1979: "Демоскоп sng_age_79, 5-летние группы"
    1989: "Демоскоп sng_age_89 (реестр «республики и регионы», БССР = reg 27)"
  yearly_estimates: "1990-2018 - Белстат 10101100003 (на 1 января); 2020-2026 - age_current.csv"
  census_1999: "переписная таблица в открытых машиночитаемых источниках отсутствует - кадр 1999 = официальная оценка"
interpolation:
  method: "когортный варп: пирамида ранней опоры «стареет» сдвигом k=(t-Y0)/5
    доли каждой группы в следующую, поздней - «молодеет» обратным сдвигом;
    линейное смешение по весу (t-Y0)/(Y1-Y0)"
  type_label: interpolated
  note: "визуальная интерполяция для морфинга; числа приближённые"
future:
  source: "экспорт CCMPP v2026.4 (forecast_age_by_v2026_4.json), узлы 2026-2076"
  grid: "календарные 2030-2075 шаг 5 - линейная интерполяция соседних узлов по ячейкам"
  scenarios: [base, optimistic, negative]
  jumpoffs: [official, adjusted]
  wpp_placeholder: "запрещена в проде; WPP-2024 medium - только кросс-чек (checks/)"
