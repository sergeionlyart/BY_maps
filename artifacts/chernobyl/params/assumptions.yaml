# Все допущения INF-07 с обоснованиями. Файл ДОКУМЕНТИРУЕТ допущения и
# кодом не читается: для стресс-теста правьте константы в etl/chernobyl.py
# (CLASS1/CLASS2, cost(), minsk_suburbs) и перезапускайте code/run.sh -
# конкретные рецепты в AGENT.md.

class1_districts:
  value: ["Брагинский", "Хойникский", "Наровлянский"]
  rationale: >
    Официальный список: «наиболее пострадавшие районы..., с которых в
    1986 г. эвакуировано 22 тыс. человек, создан Полесский государственный
    радиационно-экологический заповедник» (МЧС, «Беларусь и Чернобыль:
    36 лет», разд. 4.3.7). Не расширяется: четвёртого района эвакуации
    официальные источники не называют.

class2_criterion:
  value: "закрытые отселённые территории с КПП-режимом (табл. 12 МЧС), кроме Климовичского"
  rationale: >
    Табл. 12 - официальный список 13 районов с контрольно-пропускным
    режимом; Климовичский (534 га, 0 отселённых НП со строениями) -
    пограничный, вне классификации. Ельский (12 НП 5-15 Ки, без закрытых
    территорий) - тоже вне: мягкий порог дал бы только его.

matching_base_year:
  value: 1979
  rationale: "последняя перепись до катастрофы; структура ещё не искажена отселением"

matching_cost:
  value: "|ln(pop_c/pop_a)| + 0.5*west1921 + 0.15*other_oblast"
  rationale: >
    Основной признак - размер района до шока. Штраф Западной Беларуси:
    иная траектория XX века (Польша 1921-1939, другая коллективизация и
    структура расселения). Штраф чужой области мягкий: в Гомельской
    области «чистых» районов почти нет (19 из 21 в перечнях), большинство
    контролей неизбежно из других областей востока.

excluded_controls:
  value: ["r-minski", "r-dziarzhynski", "r-smaliavicki"]
  rationale: >
    Ядро минской агломерации: аномальный рост (Дзержинский +36% к 1979)
    не является «естественной» траекторией сельского района; включение
    завысило бы эффект. Исключение консервативно.

control_reuse:
  value: false
  rationale: "жадный матчинг без повторов, от крупнейшего района к меньшим"
