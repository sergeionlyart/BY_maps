# Все допущения INF-06 с обоснованиями. Файл ДОКУМЕНТИРУЕТ допущения и
# кодом не читается: для стресс-теста правьте константы в etl/monotowns.py
# (BASELINE, K_CONTROLS, DEP_WEIGHT, OBL_CENTERS) и перезапускайте
# code/run.sh - рецепты в AGENT.md.

registry:
  value: "49 пар город-предприятие, ручная курация по открытым источникам"
  why: >
    градообразующее предприятие есть у большинства малых/средних городов
    Беларуси; отбор - значимые пары с прослеживаемым источником

risk_band:
  value: "зависимость (high/medium/low -> 2/1/0) + санкции (есть -> +1); 3=высокий, 2=повышенный, 1=умеренный, 0=низкий"
  why: >
    риск при негативном сценарии = сила зависимости от одного завода x
    его санкционная уязвимость; проспективная уязвимость, НЕ свершившийся спад

baseline_1989:
  value: "индекс населения к 1989 = 100"
  why: >
    последняя советская перепись, старт постсоветской трансформации;
    новые города-заводы к 1989 уже зрелые

matched_controls:
  value: "8 ближайших по ln(население-1989) городов, не моногорода и не облцентры"
  why: >
    «типовой город того же размера» как контрфакт; исключаем моногорода
    (чтобы контроль был «обычным») и облцентры (диверсифицированы);
    медиана 8 гасит шум отдельного города

mono_dependence:
  value: "экспертная оценка high/medium/low по источникам"
  why: >
    доля предприятия в занятости города точно не публикуется; облцентры
    с крупным заводом -> low (экономика диверсифицирована)

employment:
  value: "оценка занятости с годом (диапазоны, «≈»)"
  why: "штат не публикуется единообразно; берём из отчётов/прессы с датой"

sanctions:
  value: "адресные санкции EU/US/UK/Canada с юрисдикцией и датой, на 2026-07-12"
  why: >
    быстро меняются (напр. калий исключён из SDN США 26.03.2026, санкции
    ЕС сохраняются) - поле «актуально на дату»

causality:
  value: "ассоциация, не причинность"
  why: >
    население и завод могут двигаться вместе по общей причине; индекс и
    разрыв - описательные
