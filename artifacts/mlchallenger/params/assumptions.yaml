# Допущения ML-challenger (этап 8). Каждое значение — с обоснованием.
# Все параметры фиксированы в etl/challenger.py (GB, SEED, N_PERM, ...).

model:
  type: "градиентный бустинг регрессионных деревьев (чистый stdlib, L2)"
  seed: 20260712
  n_estimators: 300           # верхний предел; фактическое число — ранняя остановка по OOF
  learning_rate: 0.05         # малый шаг: каждый бустинг-раунд почти линеен
  max_depth: 2                # пни/почти-пни — ёмкость дерева жёстко ограничена
  min_leaf: 10                # >=8% выборки в листе: n=118 не даёт мельчить
  subsample: 0.7              # стохастический GB: декоррелирует деревья
  feat_sub: 5                 # подвыборка признаков на сплит из 12
  patience: 25                # ранняя остановка: минимум OOF SSE с терпением
  rationale: >
    n=118 и одна перепись-транзиция => переобучение — центральный риск.
    Регуляризация многослойна (глубина 2, крупные листья, малый lr, ранняя
    остановка по кросс-валидации, подвыборки) + перестановочный нуль,
    гейтящий КАЖДОЕ заявление.

target:
  definition: "e_i = ln(факт_2026_i / CCR_2026_i)"
  rationale: >
    Знаковая ошибка инкумбента CCR на его ЕДИНСТВЕННОМ подлинном OOS-окне
    (2019->2026). CCR нормирован к истинному областному итогу => e_i —
    ЧИСТО внутриобластная ошибка распределения. Мишень мала (СКО ~2,8%).
  caveat: >
    факт_2026 — оценка Белстата (не перепись), СКО лог-прироста лишь 0,055,
    и она сама учитывает миграцию, которую CCR игнорирует. Поэтому детекция
    систематической ошибки означает прежде всего «CCR недо-использует
    миграционную динамику», а магнитуда — слабое свидетельство.

cross_validation:
  scheme: "leave-one-oblast-out (6 областных фолдов; Минск-город — не район)"
  rationale: >
    Районы одной области пространственно скоррелированы, а CCR-нормировка —
    внутриобластная. Случайный k-fold дал бы утечку структуры. LOO-по-области
    — честная и совпадает с логикой нормировки.
  repeated_cv: 30             # варьируем сид субвыборки -> полоса 5/95
  permutation_null: 200       # тасуем мишень при фиксированном m -> p-значение

leakage_guard:
  rule: "все признаки датированы <= 2019 (база окна); ни один не из 2020-2026"
  excluded: >
    wages.json wageRel/popChange/resid/cls (окно 2015-2025), access
    popChange/eu2026/euNadir/euDelta (пост-2020 закрытие границы), nightlights
    lightRatio/popRatio/div и свет 2020-2023 (пост-база + версия VNL 2.2),
    любой forecast_v2026. Признаки строятся из СЫРЫХ csv/строк, не из
    оконно-посчитанных полей.

perimeter:
  canonical: "перепись A (район БЕЗ города обл. подчинения) — как у мишени и age-CSV"
  host_handling: >
    Ночная светимость/доступность включают город (периметр B) для 10 host-
    районов => интенсивные (душевые/отношения) признаки + host_flag-контроль +
    робастность-прогон без 10 host'ов (в LIMITATIONS).

boundary:
  scope: "диагностика на 7-летнем окне районного РАСПРЕДЕЛЕНИЯ; НЕ конкурирующий прогноз, НЕ инструмент на 50 лет (ROADMAP §2). Инкумбент CCR/CCMPP остаётся основой."
