# Допущения модели вне сценарных YAML - каждое с обоснованием.
# Сценарные параметры (СКР, ОПЖ, миграция) - etl/forecast/scenarios/*.yaml.

step_years:
  value: 5
  why: "классический CCMPP по 5-летним группам; согласован с доступной детализацией данных"

age_groups:
  value: "0-4 ... 75-79, 80+ (17 групп, верхняя открытая)"
  why: "верхняя группа источников (дата-портал и OLAP переписей) - 80+; открытый интервал по стандарту ООН"

srb:
  value: 1.05
  why: "соотношение полов при рождении 105 мальчиков на 100 девочек - фактическое для Беларуси (ежегодник)"

tfr_national_2018:
  value: 1.448
  why: "якорь масштабирования областных ASFR-профилей; HFD Беларусь 2018 (сумма однолетних ASFR)"

mortality_scaling:
  value: "mx * k (бисекция к целевому e0)"
  why: >
    монотонное детерминированное масштабирование вместо Ли-Картера: при
    двух надёжных опорных точках (HMD-2018) и сценарных e0-таргетах даёт
    воспроизводимый результат; кросс-проверка e0 с HMD - в инвариантах
  vary: "AGENT.md задача 3.2"

annual_interoblast_moves:
  value: 60000
  why: >
    межобластная миграция РБ по ежегодникам 2015-2019 - 55-65 тыс.
    перемещений в год; lifetime-матрица переписи используется только как
    профиль направлений и возрастов
  vary: "etl/forecast/migration.py::ANNUAL_INTEROBLAST_MOVES; AGENT.md задача 3.1"

intl_keys:
  value: "Минск 0.62, Минская 0.10, остальные 0.05-0.06"
  why: >
    распределение международного сальдо по областям - стартовые ключи WP-F3
    из TASK_SPEC (Минск 55-70% потока, облцентры 20-30%), доли облцентров
    отнесены к их областям

quantiles:
  value: "q10/q90 = базовая траектория x (Lower/Upper 80 PI / Medium) WPP 2024"
  why: >
    честный перенос опубликованной вероятностной неопределённости ООН до
    появления собственного стохастического прогона (этап 8); для областей -
    та же относительная ширина (занижает региональную неопределённость -
    задокументировано в LIMITATIONS)

backtest_training:
  value: "уровни 2009 + линейные тренды 1999-2009 (e0, национальный СКР)"
  why: "правило «продолжение наблюдаемого тренда», объявлено до сравнения; вариация hold-2009 - AGENT.md задача 3.5"
