# Допущения модели вне сценарных YAML - каждое с обоснованием.
# Сценарные параметры (СКР, ОПЖ, миграция) - etl/forecast/scenarios/*.yaml.

step_years:
  value: 5
  why: "классический CCMPP по 5-летним группам; согласован с доступной детализацией данных"

age_groups:
  value: "0-4 ... 75-79, 80+ (17 групп, верхняя открытая)"
  why: "верхняя группа источников (дата-портал и OLAP переписей) - 80+; открытый интервал по стандарту ООН"

srb:
  value: 1.05
  why: "соотношение полов при рождении 105 мальчиков на 100 девочек - фактическое для Беларуси (ежегодник)"

tfr_national_2018:
  value: 1.448
  why: "якорь масштабирования областных ASFR-профилей; HFD Беларусь 2018 (сумма однолетних ASFR)"

mortality_scaling:
  value: "mx * k (бисекция к целевому e0)"
  why: >
    монотонное детерминированное масштабирование вместо Ли-Картера: при
    двух надёжных опорных точках (HMD-2018) и сценарных e0-таргетах даёт
    воспроизводимый результат; кросс-проверка e0 с HMD - в инвариантах
  vary: "AGENT.md задача 3.2"

annual_interoblast_moves:
  value: 60000
  why: >
    межобластная миграция РБ по ежегодникам 2015-2019 - 55-65 тыс.
    перемещений в год; lifetime-матрица переписи используется только как
    профиль направлений и возрастов
  vary: "etl/forecast/migration.py::ANNUAL_INTEROBLAST_MOVES; AGENT.md задача 3.1"

intl_keys:
  value: "Минск 0.62, Минская 0.10, остальные 0.05-0.06"
  why: >
    распределение международного сальдо по областям - стартовые ключи WP-F3
    из TASK_SPEC (Минск 55-70% потока, облцентры 20-30%), доли облцентров
    отнесены к их областям

quantiles:
  value: "q10/q90 = базовая траектория x (Lower/Upper 80 PI / Medium) WPP 2024"
  why: >
    честный перенос опубликованной вероятностной неопределённости ООН до
    появления собственного стохастического прогона (этап 8); для областей -
    та же относительная ширина (занижает региональную неопределённость -
    задокументировано в LIMITATIONS)

backtest_training:
  value: "уровни 2009 + линейные тренды 1999-2009 (e0, национальный СКР)"
  why: "правило «продолжение наблюдаемого тренда», объявлено до сравнения; вариация hold-2009 - AGENT.md задача 3.5"

# --- этап 5: уровни 2-3 (районы и города) --------------------------------

k_shrink:
  value: 1000
  why: >
    shrinkage районных CCR к областному профилю w = n/(n+K): когорты
    районов - сотни-тысячи человек, K=1000 даёт полусмесь на когорте в
    1000 чел. (рекомендация регуляризации малых территорий, Wilson 2021);
    бэктест-2026 слабо чувствителен (MAPE 2,09-2,22% при K=500/1000/2000)
  vary: "etl/forecast/sub.py::K_SHRINK; AGENT.md задача 3.2"

ccr_floor_cap:
  value: "CCR в коридоре 0,6-1,6 областного"
  why: >
    защита от выбросов малых когорт (нулевые/экстремальные переходы);
    верх 1,6 допускает наблюдаемую субурбанизацию Минского района

chernobyl_w_cap:
  value: 0.5
  why: >
    районы классов 1-2 реестра INF-07: вес собственного CCR не выше 50% -
    страховка от экстраполяции постчернобыльского падения; на данных
    2009-2019 малоактивна (эффект +-1-2% к 2075), см. AGENT.md задача 3.3
  vary: "etl/forecast/sub.py::W_CAP_CHERNOBYL"

oblcenter_mig_decay:
  value: "имплицированная миграция 2009-2019 затухает до 0.4 к 2060"
  why: >
    миграционная привлекательность облцентров сохраняется, но ослабевает
    с сжатием демографической базы периферии; вариация 0,2/0,6 сдвигает
    облцентры на ~+-2% к 2075 (AGENT.md задача 3.4)
  vary: "etl/forecast/sub.py::MIG_DECAY_TO"

start_calibration_2026:
  value: "траектория территории x (официальная оценка 2026 / модель 2026), затем ре-нормировка к области"
  why: >
    CCR задают динамику 2009-2019, но уровень 2026 известен из официальных
    оценок - прогноз стартует с факта (макс. отклонение старта 0,6% - гп
    с рядами, оборванными до 2026)

city_share_model:
  value: "logit(доля города в районе) ~ год, OLS 1970-2026; |наклон| <= 0.03/год; уровень якорится на последнем наблюдении"
  why: >
    логистический тренд не выходит за [0,1] по построению; якорь на
    последнем наблюдении исключает скачок на старте; кэп наклона -
    максимум устойчиво наблюдаемых длинных трендов урбанизации
  vary: "etl/forecast/sub.py::SLOPE_CAP, fit_city_share"

city_share_caps:
  value: "город <= 92% района; сумма городов района <= 95% (до целочисленного округления экспорта: в CSV возможен выход на <1 чел.)"
  why: >
    в районе всегда остаётся сельское население и малые НП; максимум
    факта-2026 среди городов уровня 3 - 84,7% (Кричев); города обл.
    подчинения (до 92,8% района-хоста) прогнозируются напрямую, не долей
