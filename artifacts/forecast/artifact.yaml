# Проверяемый пакет прогноза населения 2026-2075 (v2026.4, уровни 0-3 + ряд adjusted
# + вероятностный слой Монте-Карло СКР/ОПЖ).
# Сборка: python -m etl.artifacts.build forecast

id: forecast
title: "Прогноз населения Беларуси 2026–2075, v2026.4 (уровни 0–3; ряды official/adjusted; вероятностный веер)"
version: "1.3.0"
released: "2026-07-12"
landing_url: "https://by-population-maps.vercel.app/?sel=BY"
authors:
  - "Проект «Население Беларуси, 1897–2026»"

files:
  - { path: README.md, role: docs }
  - { path: CHANGELOG.md, role: docs }
  - { path: AGENT.md, role: docs }
  - { path: LIMITATIONS.md, role: docs }
  - { path: PROVENANCE.md, role: docs }
  - { path: CITATION.cff, role: docs }
  - { path: LICENSE.md, role: docs }
  - { path: sources/registry.csv, from: data/raw/registry_wpf1.csv, role: docs }
  # входные данные (curated, пути повторяют репозиторий - код работает без правок)
  - { path: data/curated/age_current.csv, from: data/curated/age_current.csv, role: intermediate, license: "CC BY 4.0" }
  - { path: data/curated/age2009.csv, from: data/curated/age2009.csv, role: intermediate, license: "CC BY 4.0" }
  - { path: data/curated/age2019.csv, from: data/curated/age2019.csv, role: intermediate, license: "CC BY 4.0" }
  - { path: data/curated/fertility_oblast.csv, from: data/curated/fertility_oblast.csv, role: intermediate, license: "CC BY 4.0" }
  - { path: data/curated/mortality.csv, from: data/curated/mortality.csv, role: intermediate, license: "CC BY 4.0 (OWID)/HMD" }
  - { path: data/curated/migration_internal.csv, from: data/curated/migration_internal.csv, role: intermediate, license: "CC BY 4.0" }
  - { path: data/curated/oblast_totals.csv, from: data/curated/oblast_totals.csv, role: intermediate, license: "CC BY 4.0" }
  # уровни 2-3 (этап 5): ряды районов/городов, привязка город-район,
  # реестр чернобыльских классов (floor CCR)
  - { path: web/public/data/data.json, from: web/public/data/data.json, role: intermediate, license: "CC BY 4.0" }
  - { path: data/curated/city_raion.csv, from: data/curated/city_raion.csv, role: intermediate, license: "CC BY 4.0" }
  - { path: data/curated/chernobyl_zones.csv, from: data/curated/chernobyl_zones.csv, role: intermediate, license: "CC BY 4.0" }
  # WP-F3: зеркальная статистика эмиграции и поправка adjusted
  - { path: data/raw/mirror/registry.csv, from: data/raw/mirror/registry.csv, role: docs }
  - { path: data/raw/mirror/eurostat_migr_resvalid_BY_2019-2024.json, from: data/raw/mirror/eurostat_migr_resvalid_BY_2019-2024.json, role: raw, license: "CC BY 4.0 (Eurostat)" }
  - { path: data/raw/mirror/eurostat_migr_resfirst_BY_2015-2024.json, from: data/raw/mirror/eurostat_migr_resfirst_BY_2015-2024.json, role: raw, license: "CC BY 4.0 (Eurostat)" }
  - { path: data/raw/mirror/eurostat_migr_resfirst_BY_2019_duration.json, from: data/raw/mirror/eurostat_migr_resfirst_BY_2019_duration.json, role: raw, license: "CC BY 4.0 (Eurostat)" }
  - { path: data/raw/mirror/udsc_raport_BY_2026-01-01.txt, from: data/raw/mirror/udsc_raport_BY_2026-01-01.txt, role: raw, license: "официальная статистика UDSC" }
  - { path: data/raw/mirror/udsc_raport_BY_2026-06-01.txt, from: data/raw/mirror/udsc_raport_BY_2026-06-01.txt, role: raw, license: "официальная статистика UDSC" }
  - { path: data/raw/mirror/gus_populacja_cudzoziemcow_covid19.txt, from: data/raw/mirror/gus_populacja_cudzoziemcow_covid19.txt, role: raw, license: "официальная статистика GUS" }
  - { path: data/raw/mirror/newbelarus_diaspora_snapshot_2023.pdf, from: data/raw/mirror/newbelarus_diaspora_snapshot_2023.pdf, role: raw, license: "открытая публикация ЦНИ" }
  - { path: data/raw/mirror/newbelarus_diaspora_snapshot_2023.txt, from: data/raw/mirror/newbelarus_diaspora_snapshot_2023.txt, role: raw, license: "открытая публикация ЦНИ" }
  - { path: etl/mirror.py, from: etl/mirror.py, role: code }
  - { path: data/curated/migration_mirror.csv, from: data/curated/migration_mirror.csv, role: intermediate, license: "CC BY 4.0" }
  - { path: data/curated/adjustment.csv, from: data/curated/adjustment.csv, role: intermediate, license: "CC BY 4.0" }
  - { path: docs/notes/adjustment.md, from: docs/notes/adjustment.md, role: docs }
  - { path: data/raw/wpp2024/blr_indicators_medium.csv, from: data/raw/wpp2024/blr_indicators_medium.csv, role: raw, license: "CC BY 3.0 IGO" }
  - { path: data/raw/wpp2024/blr_total_all_variants.csv, from: data/raw/wpp2024/blr_total_all_variants.csv, role: raw, license: "CC BY 3.0 IGO" }
  - { path: data/raw/wcde/blr_pop_total_ssp123.csv, from: data/raw/wcde/blr_pop_total_ssp123.csv, role: raw, license: "CC BY 4.0" }
  # код: пакет etl.forecast как в репозитории + документация данных
  - { path: etl/__init__.py, from: artifacts/forecast/shims/etl_init.py, role: code }
  - { path: etl/common.py, from: artifacts/forecast/shims/common.py, role: code }
  - { path: etl/forecast/__init__.py, from: etl/forecast/__init__.py, role: code }
  - { path: etl/forecast/data.py, from: etl/forecast/data.py, role: code }
  - { path: etl/forecast/lifetable.py, from: etl/forecast/lifetable.py, role: code }
  - { path: etl/forecast/ccmpp.py, from: etl/forecast/ccmpp.py, role: code }
  - { path: etl/forecast/migration.py, from: etl/forecast/migration.py, role: code }
  - { path: etl/forecast/run.py, from: etl/forecast/run.py, role: code }
  - { path: etl/forecast/probabilistic.py, from: etl/forecast/probabilistic.py, role: code }
  - { path: etl/forecast/sub.py, from: etl/forecast/sub.py, role: code }
  - { path: etl/forecast/backtest.py, from: etl/forecast/backtest.py, role: code }
  - { path: etl/forecast/backtest_sub.py, from: etl/forecast/backtest_sub.py, role: code }
  - { path: etl/forecast/sensitivity.py, from: etl/forecast/sensitivity.py, role: code }
  - { path: etl/forecast/scenarios/base.yaml, from: etl/forecast/scenarios/base.yaml, role: params }
  - { path: etl/forecast/scenarios/optimistic.yaml, from: etl/forecast/scenarios/optimistic.yaml, role: params }
  - { path: etl/forecast/scenarios/negative.yaml, from: etl/forecast/scenarios/negative.yaml, role: params }
  - { path: params/assumptions.yaml, role: params }
  - { path: code/run.sh, role: code }
  - { path: code/verify.py, role: code }
  - { path: code/requirements.lock, role: code }
  - { path: checks/tests/test_invariants.py, role: code }
  # итоговые данные - ровно те, что на лендинге
  - { path: data/final/computed_results.json, role: final, license: "CC BY 4.0" }
  - { path: data/curated/forecast_v2026_4.csv, from: data/curated/forecast_v2026_4.csv, role: final, license: "CC BY 4.0" }
  - { path: web/public/data/forecast.json, from: web/public/data/forecast.json, role: final, license: "CC BY 4.0" }
  - { path: docs/notes/backtest_results.json, from: docs/notes/backtest_results.json, role: final, license: "CC BY 4.0" }
  - { path: docs/notes/backtest_sub.json, from: docs/notes/backtest_sub.json, role: final, license: "CC BY 4.0" }
  - { path: docs/notes/sensitivity.json, from: docs/notes/sensitivity.json, role: final, license: "CC BY 4.0" }
  - { path: docs/notes/crosscheck.json, from: docs/notes/crosscheck.json, role: final, license: "CC BY 4.0" }
  - { path: docs/notes/validation.md, from: docs/notes/validation.md, role: docs }

sources:
  - id: wpf1_registry
    url: "см. sources/registry.csv - полный реестр 18 источников WP-F1 (Белстат OLAP/дата-портал, HMD/HFD via OWID, UN WPP 2024, WCDE v3) с URL, лицензиями и sha256"
    description: "Все входы прогноза унаследованы от этапа WP-F1"
    license: "по источникам (см. реестр)"
    accessed: "2026-07-11"

entrypoints:
  reproduce: "code/run.sh"
  verify: "python3 checks/tests/test_invariants.py"

environment:
  python: ">=3.10"
  lock: "code/requirements.lock"
  seed: 20260712   # веер вероятностного слоя - сеяный Монте-Карло (random.Random);
                   # медианы/сценарии детерминированы, случайность лишь в квантилях

# Допуски: прогон детерминирован; 1 человек - на платформенное округление.
expected_results:
  - { metric: pop_BY_base_2051, value: 7529192, tolerance: 1,
      description: "страна, базовый сценарий, 2051 (гейт WP-F4: +-3% от WPP medium-2050 7 453,5 тыс. - выполнен: +1,0%)" }
  - { metric: pop_BY_base_2075, value: 5970126, tolerance: 1,
      description: "страна, базовый, 2075" }
  - { metric: q10_BY_base_2075, value: 5044411, tolerance: 1,
      description: "нижняя граница 80% интервала, 2075 (вероятностный слой: квантиль ансамбля Монте-Карло, сид 20260712)" }
  - { metric: q90_BY_base_2075, value: 7037757, tolerance: 1,
      description: "верхняя граница 80% интервала, 2075 (вероятностный слой)" }
  - { metric: prob_sim80_2051, value: 0.0666, tolerance: 0.001,
      description: "полуширина 80% интервала страны 2050 (симуляция); WPP-2024 0.0706 - расхождение ≤1,5 п.п. (калибровка)" }
  - { metric: prob_sim80_2075, value: 0.165, tolerance: 0.001,
      description: "полуширина 80% интервала страны 2075 (симуляция); WPP-2024 0.163 - расхождение ≤1,5 п.п." }
  - { metric: prob_pDecline_2051, value: 1.0, tolerance: 0.01,
      description: "P(население страны 2050 < старта 2026) по ансамблю - убыль практически достоверна" }
  - { metric: prob_pBelow6M_2075, value: 0.497, tolerance: 0.03,
      description: "P(население страны 2075 < 6 млн) по ансамблю" }
  - { metric: pop_BY_optimistic_2075, value: 7106066, tolerance: 1,
      description: "страна, оптимистический, 2075" }
  - { metric: pop_BY_negative_2075, value: 4334636, tolerance: 1,
      description: "страна, негативный, 2075" }
  - { metric: pop_BY-HM_base_2075, value: 1824694, tolerance: 1,
      description: "Минск, базовый, 2075 (доля столицы растёт при общей убыли)" }
  - { metric: pop_BY-VI_base_2075, value: 487539, tolerance: 1,
      description: "Витебская область, базовый, 2075 (сильнейшая убыль)" }
  - { metric: backtest_national_err_pct, value: -0.42, tolerance: 0.02,
      description: "бэктест 2009->2019: ошибка национального итога (гейт +-2%)" }
  - { metric: backtest_mape_model, value: 2.39, tolerance: 0.02,
      description: "бэктест: MAPE модели по 7 территориям" }
  - { metric: backtest_mape_naive, value: 4.13, tolerance: 0.02,
      description: "бэктест: MAPE наивной экстраполяции (гейт: модель лучше)" }
  # уровни 2-3 (этап 5)
  - { metric: pop_r-minski_base_2075, value: 655305, tolerance: 1,
      description: "Минский район, базовый, 2075: продолжение субурбанизации (CCR + IPF)" }
  - { metric: pop_r-chojnicki_base_2075, value: 7674, tolerance: 1,
      description: "Хойникский район, базовый, 2075 (чернобыльский floor CCR активен)" }
  - { metric: pop_c-homiel_base_2075, value: 317430, tolerance: 1,
      description: "Гомель, базовый, 2075 (собственный CCMPP облцентра)" }
  - { metric: pop_c-orsha_base_2075, value: 42663, tolerance: 1,
      description: "Орша, базовый, 2075 (доля в районе, логистический тренд)" }
  - { metric: backtest_sub_mape_model, value: 2.12, tolerance: 0.02,
      description: "бэктест районов 2019->2026: MAPE CCR по 128 территориям" }
  - { metric: backtest_sub_mape_naive, value: 2.76, tolerance: 0.02,
      description: "бэктест районов: MAPE наивной (гейт: CCR лучше)" }
  - { metric: backtest_cities_mape_model, value: 6.7, tolerance: 0.02,
      description: "бэктест городов (доля <=2009 -> 2019): MAPE логистической по 188 городам" }
  - { metric: backtest_cities_mape_naive, value: 10.88, tolerance: 0.02,
      description: "бэктест городов: MAPE замороженной доли (гейт: не хуже)" }
  # WP-F3: ряд adjusted
  - { metric: adjustment_mid_2026, value: 269955, tolerance: 1,
      description: "центральная оценка накопленного незарегистрированного оттока на 01.01.2026 (гейт: интервал накрывает сток ВНЖ ЕС минус довоенный сток = 252 945 и ориентир МВД 350 тыс.)" }
  - { metric: adjustment_low_2026, value: 178285, tolerance: 1,
      description: "нижняя граница: документированные «осевшие» (ЕС в карточном определении + Грузия)" }
  - { metric: adjustment_high_2026, value: 415883, tolerance: 1,
      description: "верхняя граница: сырой сток ЕС с досчётом + маятниковый резидуал + недоучёт РФ" }
  - { metric: pop_adj_BY_base_2026, value: 8786125, tolerance: 1,
      description: "adjusted-старт страны (официальный 9 056 080 минус mid-поправка)" }
  - { metric: pop_adj_BY_base_2051, value: 7239479, tolerance: 1,
      description: "страна, базовый, 2051, ряд adjusted (-3,8% к official)" }
  - { metric: pop_adj_BY_base_2075, value: 5746797, tolerance: 1,
      description: "страна, базовый, 2075, ряд adjusted" }
  - { metric: pop_adj_BY_negative_2075, value: 4152239, tolerance: 1,
      description: "страна, негативный, 2075, ряд adjusted (нижняя траектория проекта)" }
