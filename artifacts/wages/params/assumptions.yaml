# Все допущения INF-03 с обоснованиями. Файл ДОКУМЕНТИРУЕТ допущения и
# кодом не читается: для стресс-теста правьте константы в etl/wages.py
# (WINDOW, WAGE_YEARS, MINSK_SUBURBS) и перезапускайте code/run.sh -
# рецепты в AGENT.md.

window:
  value: "динамика населения 2015-2025; дифференциал - среднее 2015-2024"
  why: >
    последнее полное десятилетие с полными зарплатными рядами; вариант
    устойчивости - переписное окно 2009-2019 (дифференциал 2010-2019,
    зарплаты доступны с 2010)

differential:
  value: "зарплата района / зарплата г. Минска того же года"
  why: >
    относительная величина самонормируется: инфляция и деноминация-2016
    сокращаются; Минск - главный полюс притяжения внутренней миграции

denomination_2016:
  value: "значения 2010-2015 делятся на 10 000"
  why: "деноминация 01.07.2016 (10 000 старых = 1 новый BYN); в дифференциалах не участвует"

regression:
  value: "OLS: popChange10 (п.п.) ~ ln(mean wage_rel) + ln(pop райцентра) + const"
  why: >
    лог-спецификация даёт интерпретацию эластичности; размер центра -
    главный конфаундер (крупные центры притягивают независимо от зарплат);
    SE классические (n=118, гомоскедастичность не отвергается визуально);
    доступность (INF-04) появится как контроль позже

minsk_suburbs:
  value: ["r-minski", "r-dziarzhynski", "r-smalavicki", "r-lahojski"]
  why: >
    ядро агломерации: маятниковая занятость искажает и зарплату, и
    динамику; исключение - консервативная спецификация (beta 28,3
    против 54,3)

terciles:
  value: "классификация 3x3 по терцилям обеих осей"
  why: "спека INF-03; равнонаполненные классы (по 39-40 района в трети)"

excluded_rows:
  value: "«Не распределено по районам Минской области» (с 2024)"
  why: "служебная строка портала, не территория"
