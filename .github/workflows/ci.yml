name: CI

on:
  push:
  pull_request:

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install shapely pytest
      - name: Run ETL build
        run: python -m etl.build
      - name: ETL tests
        run: python -m pytest etl/tests/ -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Typecheck
        run: npm run lint
      - name: Build (static export)
        run: npm run build
