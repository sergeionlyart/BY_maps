            "text_paragraph_standard" : 

    
        [
                    {
            "text" : "<p>According to data from the Lithuanian Migration Department (PDF), as of June 1, 2026, there were 48,926 citizens of Belarus with Lithuanian residence permits in the country. This is 253 fewer than a month earlier and 1,360 fewer than at the beginning of the year.<\/p><p><br><\/p><p>As of January 1, 2024, there were 62,167 citizens of Belarus with Lithuanian residence permits in Lithuania. Over 2.5 years, their number has decreased by 21.3 percent.<\/p><p><br><\/p><p>Belarusians remain the second largest group of foreigners in Lithuania. In first place are Ukrainians, with 78,100 holding Lithuanian residence permits. In third place are Russians, with 13,400; followed by Uzbeks, with 11,600; and in fifth place are Indians, with 8,700. The number of Ukrainians and Russians is also decreasing, while the number of Uzbeks and Indians is growing.<\/p><p><br><\/p><p>The Migration Department does not explain why Belarusians are disappearing. It is known that Lithuanian society simultaneously feels both sympathy and wariness toward Belarusians, and social tension regarding Belarusians is growing. However, the statistics track not the number of foreign citizens on the country's territory, but the number of valid residence permits. It is possible that for some of those who have disappeared, their permits simply expired, and new ones have not yet been issued.<\/p><p><br><\/p><p>Meanwhile, the number of Belarusians in Poland may also have decreased. Recent statistics showed that as of May 1, there were 137,716 citizens of Belarus in Poland with valid residence permits or international protection, while on January 1 there were 144,219. Poland is known for its long waiting times for foreigner legalization.<\/p><p><br><\/p><p>Ales Navaborski \/ jangra <a href=\"https:\/\/en.belsat.eu\/\" rel=\"noopener noreferrer\" target=\"_blank\">belsat.eu<\/a><\/p>",
