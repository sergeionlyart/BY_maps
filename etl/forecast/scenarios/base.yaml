# Сценарий «базовый» (WP-F4). Каждое значение - с обоснованием.
id: base
name: "Базовый"
description: >
  Инерционное развитие по медианным допущениям UN WPP 2024 для Беларуси:
  траектории СКР, ОПЖ (м/ж) и международного сальдо берутся напрямую из
  файла демографических индикаторов WPP medium (data/raw/wpp2024/
  blr_indicators_medium.csv), внутренняя централизация - на уровне
  переписи-2019. Сценарий отвечает на вопрос «что будет при допущениях
  ООН на нашей фактической стартовой структуре». Калибровочный гейт:
  итог 2050 в пределах +-3% от медианы WPP (7 453,5 тыс.). Оговорка:
  стартовый СКР WPP (1,23 в 2026) выше фактических оценок 2023-2024
  (~1,0-1,1) - см. LIMITATIONS; фактический старт исследует сценарий
  «негативный».

# Траектории берутся из WPP medium напрямую:
follow_wpp: true

# Резервные таргеты (используются, только если follow_wpp: false)
tfr:
  "2026": 1.23
  "2050": 1.38
  "2075": 1.45
e0_male:
  "2026": 70.1
  "2050": 75.1
  "2075": 79.7
e0_female:
  "2026": 79.5
  "2050": 82.8
  "2075": 85.8
intl_net_per_year:
  "2026": -3600
  "2050": -1700

# Масштаб внутренней межобластной миграции (1.0 = интенсивности переписи-2019)
centripetal: 1.0
