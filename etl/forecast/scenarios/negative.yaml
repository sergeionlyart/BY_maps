# Сценарий «негативный» (WP-F4): ниже low-варианта WPP - с обоснованием.
id: negative
name: "Негативный"
description: >
  Затяжной миграционный шок, которого WPP для Беларуси не закладывает:
  продолжение эмиграционной волны 2020+ (независимые оценки оттока
  100-600 тыс.; см. ROADMAP §5) с медленным затуханием, стагнация
  рождаемости на уровне низших мировых значений, замедленный рост ОПЖ.
  Итог 2050 НИЖЕ low-варианта WPP (6 750 тыс.) осознанно: low WPP
  варьирует только рождаемость (-0.5 ребёнка), но не миграцию.

