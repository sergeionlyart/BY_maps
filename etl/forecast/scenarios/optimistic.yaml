# Сценарий «оптимистический» (WP-F4): коридор high-варианта WPP.
id: optimistic
name: "Оптимистический"
description: >
  Эффективная пронаталистская политика и восстановление притока:
  рождаемость поднимается к верхней границе WPP (high = medium +0.4-0.5
  ребёнка к 2050), смертность снижается быстрее (сходимость к странам ЕС
  Центральной Европы), миграционное сальдо становится положительным
  (возвратная миграция + приток). Калибровка: итог 2050 не выше
  high-варианта WPP (8 260 тыс.).

# старт - от уровней WPP medium 2026 (как base), далее рост к high-коридору
tfr:
  "2026": 1.25
  "2050": 1.75     # medium 1.38 + ~0.4 (шаг high-варианта WPP)
  "2075": 1.85

e0_male:
  "2026": 70.2
  "2050": 76.5     # ускоренное снижение смертности мужчин (алкоголь/ССЗ)
  "2075": 80.5
e0_female:
  "2026": 79.6
  "2050": 84.5
  "2075": 87.5

intl_net_per_year:
  "2026": -5000    # отток затухает
  "2032": 5000     # возвратная волна + приток
  "2050": 8000

centripetal: 0.85  # региональная политика ослабляет отток из областей
